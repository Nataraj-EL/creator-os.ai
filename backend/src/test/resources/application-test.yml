spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Empty API keys by default in test profile to isolate standard integration tests from real APIs
gemini:
  api-key: ""
groq:
  api-key: ""
huggingface:
  api-key: ""
cohere:
  api-key: ""


